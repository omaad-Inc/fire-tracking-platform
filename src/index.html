<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8"/>
    <title>Omaad — Patrimoine, épargne et indépendance financière (FIRE)</title>
    <base href="/"/>

    <!-- Warm up the API origin so the first XHR skips the DNS/TLS handshake -->
    <link rel="preconnect" href="https://fire-tracking-backend.onrender.com" crossorigin/>
    <link rel="dns-prefetch" href="https://fire-tracking-backend.onrender.com"/>

    <!-- Viewport & Mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    
    <!-- SEO & Description -->
    <meta name="description" content="Omaad, votre patrimoine, votre épargne, vos dettes et votre objectif FIRE réunis dans une seule application, pensée pour l'Afrique de l'Ouest et la diaspora."/>
    <meta name="keywords" content="finance, patrimoine, épargne, FIRE, indépendance financière, budget, investissement"/>
    <meta name="author" content="Omaad"/>
    
    <!-- Theme Colors -->
    <meta name="theme-color" content="#0F1A2E" media="(prefers-color-scheme: dark)"/>
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)"/>
    <meta name="msapplication-TileColor" content="#0F1A2E"/>
    <meta name="msapplication-TileImage" content="/icons/omaad-app-icon-144.png"/>
    <meta name="msapplication-navbutton-color" content="#0F1A2E"/>
    
    <!-- Apple iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="Omaad"/>
    <link rel="apple-touch-icon" href="/icons/omaad-app-icon-180.png"/>
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/omaad-app-icon-152.png"/>
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/omaad-app-icon-180.png"/>
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/omaad-app-icon-192.png"/>
    
    <!-- Apple Splash Screens (optional but improves UX) -->
    <link rel="apple-touch-startup-image" href="/icons/omaad-app-icon-512.png"/>
    
    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="48x48"/>
    <link rel="icon" type="image/png" sizes="32x32" href="/omaad-favicon-32.png"/>
    <link rel="icon" type="image/png" sizes="16x16" href="/omaad-favicon-16.png"/>
    <link rel="icon" type="image/svg+xml" href="/assets/brand/omaad-icon.svg"/>
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.webmanifest"/>
    
    <!-- Fonts: Inter self-hosted (see assets/layout/_fonts.scss) — offline + no
         render-blocking Google Fonts round-trip. Preload the latin file. -->
    <link rel="preload" href="assets/fonts/inter-latin.woff2" as="font" type="font/woff2" crossorigin/>

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website"/>
    <meta property="og:title" content="Omaad — Patrimoine, épargne et indépendance financière"/>
    <meta property="og:description" content="Votre patrimoine, votre épargne et votre objectif FIRE dans une seule application, pour l'Afrique de l'Ouest et la diaspora."/>
    <meta property="og:image" content="https://omaad.africa/og/omaad-og-1200x630.png"/>
    <meta property="og:image:width" content="1200"/>
    <meta property="og:image:height" content="630"/>
    <meta property="og:url" content="https://omaad.africa"/>
    <meta property="og:site_name" content="Omaad"/>
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image"/>
    <meta name="twitter:title" content="Omaad — Patrimoine, épargne et indépendance financière"/>
    <meta name="twitter:description" content="Votre patrimoine, votre épargne et votre objectif FIRE dans une seule application."/>
    <meta name="twitter:image" content="https://omaad.africa/og/omaad-og-1200x630.png"/>
</head>

<body>
    <app-root></app-root>
    <noscript>
        <div style="padding: 2rem; text-align: center; font-family: system-ui, sans-serif;">
            <h1>JavaScript requis</h1>
            <p>Veuillez activer JavaScript pour utiliser Omaad.</p>
        </div>
    </noscript>
</body>
</html>
